<!DOCTYPE html>
<html lang="en" x-data="{theme:localStorage.getItem('cd:theme')||'light'}" :data-theme="theme">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Server Error — ControlDeck Pro</title>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:['selector','[data-theme="dark"]'],theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    :root{--cd-bg:#F8FAFC;--cd-surface:#FFFFFF;--cd-surface-2:#F1F5F9;--cd-border:#E2E8F0;--cd-text:#0F172A;--cd-text-muted:#475569;--cd-text-subtle:#94A3B8;--cd-primary:#3B82F6;--cd-primary-hover:#2563EB;--cd-primary-light:#EFF6FF;--cd-success:#16A34A;--cd-success-light:#F0FDF4;--cd-warning:#F59E0B;--cd-warning-light:#FFFBEB;--cd-danger:#DC2626;--cd-danger-light:#FEF2F2;--cd-info:#0EA5E9;--cd-info-light:#F0F9FF;--cd-shadow-sm:0 1px 2px rgba(2,6,23,.06);--cd-shadow-md:0 8px 24px rgba(2,6,23,.10);--cd-font:Inter,system-ui,-apple-system,sans-serif;--cd-transition:200ms ease}
    [data-theme="dark"]{--cd-bg:#0F172A;--cd-surface:#1E293B;--cd-surface-2:#334155;--cd-border:#334155;--cd-text:#F1F5F9;--cd-text-muted:#94A3B8;--cd-text-subtle:#64748B;--cd-primary-light:#1E3A5F;--cd-success-light:#14532D;--cd-warning-light:#451A03;--cd-danger-light:#450A0A;--cd-info-light:#0C4A6E}
    [data-density="compact"]{font-size:calc(14px * 0.88)}[data-density="spacious"]{font-size:calc(14px * 1.12)}
    body{font-family:var(--cd-font);background:var(--cd-bg);color:var(--cd-text)}
    .ss::-webkit-scrollbar{width:4px}.ss::-webkit-scrollbar-thumb{background:var(--cd-border);border-radius:2px}
    .cd-table{width:100%;border-collapse:collapse;font-size:13px}
    .cd-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--cd-text-subtle);background:var(--cd-surface-2);border-bottom:1px solid var(--cd-border)}
    .cd-table td{padding:11px 14px;border-bottom:1px solid var(--cd-border);color:var(--cd-text);vertical-align:middle}
    .cd-table tbody tr:hover{background:var(--cd-surface-2)}
    .cd-table tbody tr:last-child td{border-bottom:none}
    .input-f{width:100%;padding:9px 12px;border:1px solid var(--cd-border);border-radius:8px;font-size:13px;font-family:var(--cd-font);background:var(--cd-surface);color:var(--cd-text);outline:none}
    .input-f:focus{border-color:var(--cd-primary);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:var(--cd-bg)">
  <div class="text-center p-8">
    <div class="text-8xl font-black mb-4 select-none" style="color:var(--cd-danger)">500</div>
    <h1 class="text-2xl font-bold mb-3" style="color:var(--cd-text)">Internal Server Error</h1>
    <p class="text-sm mb-8 max-w-sm mx-auto" style="color:var(--cd-text-muted)">Something went wrong on our end. Our team has been notified. Please try again in a few minutes.</p>
    <div class="flex gap-3 justify-center">
      <a href="index.html" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white no-underline" style="background:var(--cd-primary)">← Dashboard</a>
      <button onclick="location.reload()" class="px-5 py-2.5 rounded-xl text-sm font-semibold border cursor-pointer" style="background:transparent;border-color:var(--cd-border);color:var(--cd-text-muted)">Retry</button>
    </div>
  </div>
  <script>function app(){return{theme:localStorage.getItem('cd:theme')||'light'}}</script>
</body>
</html>
