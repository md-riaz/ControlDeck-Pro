<!DOCTYPE html>
<html lang="en" x-data="{theme:localStorage.getItem('cd:theme')||'light',pin:'',error:false}" :data-theme="theme">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locked — ControlDeck Pro</title>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:['selector','[data-theme="dark"]'],theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    :root{--cd-bg:#F8FAFC;--cd-surface:#FFFFFF;--cd-surface-2:#F1F5F9;--cd-border:#E2E8F0;--cd-text:#0F172A;--cd-text-muted:#475569;--cd-text-subtle:#94A3B8;--cd-primary:#3B82F6;--cd-primary-hover:#2563EB;--cd-primary-light:#EFF6FF;--cd-success:#16A34A;--cd-success-light:#F0FDF4;--cd-warning:#F59E0B;--cd-warning-light:#FFFBEB;--cd-danger:#DC2626;--cd-danger-light:#FEF2F2;--cd-info:#0EA5E9;--cd-info-light:#F0F9FF;--cd-shadow-sm:0 1px 2px rgba(2,6,23,.06);--cd-shadow-md:0 8px 24px rgba(2,6,23,.10);--cd-font:Inter,system-ui,-apple-system,sans-serif;--cd-transition:200ms ease}
    [data-theme="dark"]{--cd-bg:#0F172A;--cd-surface:#1E293B;--cd-surface-2:#334155;--cd-border:#334155;--cd-text:#F1F5F9;--cd-text-muted:#94A3B8;--cd-text-subtle:#64748B;--cd-primary-light:#1E3A5F;--cd-success-light:#14532D;--cd-warning-light:#451A03;--cd-danger-light:#450A0A;--cd-info-light:#0C4A6E}
    [data-density="compact"]{font-size:calc(14px * 0.88)}[data-density="spacious"]{font-size:calc(14px * 1.12)}
    body{font-family:var(--cd-font);background:var(--cd-bg);color:var(--cd-text)}
    .ss::-webkit-scrollbar{width:4px}.ss::-webkit-scrollbar-thumb{background:var(--cd-border);border-radius:2px}
    .cd-table{width:100%;border-collapse:collapse;font-size:13px}
    .cd-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--cd-text-subtle);background:var(--cd-surface-2);border-bottom:1px solid var(--cd-border)}
    .cd-table td{padding:11px 14px;border-bottom:1px solid var(--cd-border);color:var(--cd-text);vertical-align:middle}
    .cd-table tbody tr:hover{background:var(--cd-surface-2)}
    .cd-table tbody tr:last-child td{border-bottom:none}
    .input-f{width:100%;padding:9px 12px;border:1px solid var(--cd-border);border-radius:8px;font-size:13px;font-family:var(--cd-font);background:var(--cd-surface);color:var(--cd-text);outline:none}
    .input-f:focus{border-color:var(--cd-primary);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:var(--cd-bg)">
  <div class="w-full max-w-sm text-center">
    <div class="w-20 h-20 rounded-full flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4" style="background:linear-gradient(135deg,#3B82F6,#6366F1)">JD</div>
    <h1 class="text-xl font-bold mb-1" style="color:var(--cd-text)">Jane Doe</h1>
    <p class="text-sm mb-6" style="color:var(--cd-text-muted)">Session locked. Enter your PIN to continue.</p>
    <div class="rounded-2xl border p-6" style="background:var(--cd-surface);border-color:var(--cd-border);box-shadow:var(--cd-shadow-md)">
      <div class="flex justify-center gap-3 mb-5">
        <div class="w-12 h-12 rounded-xl border-2 flex items-center justify-center text-xl font-bold" :style="pin.length>=1?'border-color:var(--cd-primary);background:var(--cd-primary-light);color:var(--cd-primary)':'border-color:var(--cd-border);color:var(--cd-text-subtle)'" x-text="pin.length>=1?'●':'○'"></div>
        <div class="w-12 h-12 rounded-xl border-2 flex items-center justify-center text-xl font-bold" :style="pin.length>=2?'border-color:var(--cd-primary);background:var(--cd-primary-light);color:var(--cd-primary)':'border-color:var(--cd-border);color:var(--cd-text-subtle)'" x-text="pin.length>=2?'●':'○'"></div>
        <div class="w-12 h-12 rounded-xl border-2 flex items-center justify-center text-xl font-bold" :style="pin.length>=3?'border-color:var(--cd-primary);background:var(--cd-primary-light);color:var(--cd-primary)':'border-color:var(--cd-border);color:var(--cd-text-subtle)'" x-text="pin.length>=3?'●':'○'"></div>
        <div class="w-12 h-12 rounded-xl border-2 flex items-center justify-center text-xl font-bold" :style="pin.length>=4?'border-color:var(--cd-primary);background:var(--cd-primary-light);color:var(--cd-primary)':'border-color:var(--cd-border);color:var(--cd-text-subtle)'" x-text="pin.length>=4?'●':'○'"></div>
      </div>
      <p x-show="error" class="text-xs mb-3" style="color:var(--cd-danger)">Incorrect PIN. Try again.</p>
      <div class="grid grid-cols-3 gap-2">
        <template x-for="n in [1,2,3,4,5,6,7,8,9,'',0,'⌫']" :key="n">
          <button @click="n==='⌫'?pin=pin.slice(0,-1):n!==''&&pin.length<4?(pin+=n,pin.length===4&&(pin==='1234'?window.location='index.html':(error=true,setTimeout(()=>{pin='';error=false},800)))):null" class="py-3 rounded-xl text-lg font-semibold border-none cursor-pointer transition-all" :style="n!==''?'background:var(--cd-surface-2);color:var(--cd-text)':'background:transparent;cursor:default'" x-text="n"></button>
        </template>
      </div>
    </div>
    <p class="text-center text-xs mt-4" style="color:var(--cd-text-subtle)">Demo PIN: 1234 · <a href="login.html" style="color:var(--cd-primary)">Switch Account</a></p>
  </div>
</body>
</html>
